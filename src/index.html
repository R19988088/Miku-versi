<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#10c8c7">
    <title>Miku-versi</title>
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body class="app-booting">
    <main class="app-shell">
      <section class="first-player-screen" id="firstPlayerScreen" aria-label="选择先后手" hidden>
        <div class="first-player-options">
          <button class="first-player-card" type="button" data-player="first">
            <span class="choice-corner top-left"></span>
            <span class="choice-corner top-right"></span>
            <span class="choice-corner bottom-left"></span>
            <span class="choice-corner bottom-right"></span>
            <span class="choice-order">顺序</span>
            <span class="choice-label">先攻!</span>
            <canvas class="choice-disc" id="firstChoiceDisc" aria-hidden="true"></canvas>
          </button>
          <button class="first-player-card" type="button" data-player="second">
            <span class="choice-corner top-left"></span>
            <span class="choice-corner top-right"></span>
            <span class="choice-corner bottom-left"></span>
            <span class="choice-corner bottom-right"></span>
            <span class="choice-order">顺序</span>
            <span class="choice-label">后攻!</span>
            <canvas class="choice-disc" id="secondChoiceDisc" aria-hidden="true"></canvas>
          </button>
        </div>
      </section>

      <aside class="hud" aria-label="计分板">
        <div class="turn-bubble" id="turnBubble">你的回合</div>
        <section class="top-actions" aria-label="工具">
          <button class="menu-button" id="menuBtn" type="button" aria-label="菜单">☰</button>
          <button class="undo-top-button" id="passBtn" type="button">
            <span class="undo-label">悔棋</span>
            <span class="undo-count" id="undoRemaining">3</span>
          </button>
        </section>
        <section class="score-panel cpu">
          <div class="player-name">ミク</div>
          <div class="score-row">
            <canvas class="score-disc" id="whiteScoreDisc" aria-hidden="true"></canvas>
            <strong id="whiteScore">2</strong>
          </div>
        </section>
        <section class="score-panel human">
          <div class="player-name">あなた</div>
          <div class="score-row">
            <canvas class="score-disc" id="blackScoreDisc" aria-hidden="true"></canvas>
            <strong id="blackScore">2</strong>
          </div>
        </section>
      </aside>

      <section class="board-wrap" aria-label="黑白棋棋盘">
        <div class="board" id="board"></div>
        <div class="message" id="message" role="status" aria-live="polite"></div>
      </section>

      <section class="menu-modal" id="menuModal" aria-label="菜单" hidden>
        <div class="menu-panel">
          <div class="menu-select-label">难度</div>
          <div class="difficulty-options" id="difficulty" role="radiogroup" aria-label="难度">
            <button class="difficulty-option selected" type="button" data-value="auto" role="radio" aria-checked="true">自适应</button>
            <button class="difficulty-option" type="button" data-value="easy" role="radio" aria-checked="false">简单</button>
            <button class="difficulty-option" type="button" data-value="normal" role="radio" aria-checked="false">普通</button>
            <button class="difficulty-option" type="button" data-value="hard" role="radio" aria-checked="false">困难</button>
          </div>
          <label class="menu-toggle">
            <span>BGM</span>
            <input id="bgmToggle" type="checkbox" checked>
            <span class="menu-check" aria-hidden="true"></span>
          </label>
          <label class="menu-toggle">
            <span>AI 对局</span>
            <input id="aiBattleToggle" type="checkbox">
            <span class="menu-check" aria-hidden="true"></span>
          </label>
          <button class="restart-menu-button" id="newGameBtn" type="button">重新开局</button>
        </div>
      </section>

      <section class="settlement" id="settlement" aria-label="结算" hidden>
        <div class="settlement-panel">
          <h1 id="settlementTitle">结算</h1>
          <dl class="settlement-lines">
            <div>
              <dt>己方棋子数</dt>
              <dd id="resultPieces">0</dd>
            </div>
            <div>
              <dt>基本分数</dt>
              <dd id="resultBase">0</dd>
            </div>
            <div>
              <dt>不悔棋奖励</dt>
              <dd id="resultNoUndo">0</dd>
            </div>
            <div>
              <dt>多线奖励</dt>
              <dd id="resultMulti">0</dd>
            </div>
            <div>
              <dt>完全胜利奖励</dt>
              <dd id="resultPerfect">0</dd>
            </div>
            <div>
              <dt>秘密奖励</dt>
              <dd id="resultSecret">0</dd>
            </div>
          </dl>
          <div class="settlement-total">
            <span>合计</span>
            <strong id="resultTotal">0</strong>
          </div>
          <button class="settlement-restart" id="settlementRestartBtn" type="button">再来一次!</button>
        </div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
