name: Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Create Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Configure release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          cat >> android/gradle.properties <<'EOF'
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle")
          s = p.read_text()
          signing = "\n".join([
              "android {",
              "    signingConfigs {",
              "        release {",
              "            storeFile file(MYAPP_UPLOAD_STORE_FILE)",
              "            storePassword MYAPP_UPLOAD_STORE_PASSWORD",
              "            keyAlias MYAPP_UPLOAD_KEY_ALIAS",
              "            keyPassword MYAPP_UPLOAD_KEY_PASSWORD",
              "        }",
              "    }",
          ])
          s = s.replace(
              "android {",
              signing,
              1,
          )
          s = s.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
          p.write_text(s)
          PY

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: miku-versi-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
