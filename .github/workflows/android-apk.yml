name: Android APK and macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Create Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub Secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${ANDROID_KEY_ALIAS}
          MYAPP_UPLOAD_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}
          MYAPP_UPLOAD_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}
          EOF
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle")
          s = p.read_text()
          signing = "\n".join([
              "android {",
              "    signingConfigs {",
              "        release {",
              "            storeFile file(MYAPP_UPLOAD_STORE_FILE)",
              "            storePassword MYAPP_UPLOAD_STORE_PASSWORD",
              "            keyAlias MYAPP_UPLOAD_KEY_ALIAS",
              "            keyPassword MYAPP_UPLOAD_KEY_PASSWORD",
              "        }",
              "    }",
          ])
          s = s.replace(
              "android {",
              signing,
              1,
          )
          s = s.replace(
              "release {\n            minifyEnabled false",
              "release {\n            signingConfig signingConfigs.release\n            minifyEnabled false",
              1,
          )
          p.write_text(s)
          PY

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Verify signed APK
        run: |
          find android/app/build/outputs/apk -type f -name "*.apk" -print
          mkdir -p artifacts
          signed_apk="$(find android/app/build/outputs/apk/release -type f -name "*.apk" ! -name "*unsigned*" | head -n 1)"
          if [ -z "$signed_apk" ]; then
            echo "No signed release APK was found."
            exit 1
          fi
          cp "$signed_apk" artifacts/miku-versi-release.apk
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner" verify --verbose --print-certs artifacts/miku-versi-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: miku-versi-release-apk
          path: artifacts/miku-versi-release.apk
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: miku-versi-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
